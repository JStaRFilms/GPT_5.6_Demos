<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kestrel-7 // Light Freighter</title>
  <style>
    :root { --amber:#ff9b38; --hot:#ffc16d; --ink:#060709; --panel:rgba(7,10,12,.78); }
    * { box-sizing:border-box; }
    html,body { margin:0; width:100%; height:100%; overflow:hidden; background:#020304; color:var(--amber); font-family:"Courier New",monospace; }
    canvas { display:block; }
    #landing, #fade { position:fixed; inset:0; z-index:10; display:grid; place-items:center; }
    #landing { background:radial-gradient(ellipse at 50% 35%,rgba(105,42,10,.22),transparent 39%),linear-gradient(145deg,#0c1115,#030405 72%); }
    .landing-card { width:min(760px,88vw); text-align:center; border-top:1px solid rgba(255,155,56,.7); border-bottom:1px solid rgba(255,155,56,.38); padding:34px 20px 28px; position:relative; background:linear-gradient(90deg,transparent,rgba(255,155,56,.04),transparent); }
    .landing-card:before,.landing-card:after { content:""; position:absolute; width:7px; height:7px; border:1px solid var(--amber); top:-4px; }
    .landing-card:before{left:0}.landing-card:after{right:0}
    .kicker { letter-spacing:.3em; font-size:10px; opacity:.7; margin-bottom:14px; }
    h1 { margin:0; font-size:clamp(27px,5vw,57px); font-weight:400; letter-spacing:.06em; text-shadow:0 0 18px rgba(255,126,32,.32); }
    .sub { color:#ae6c33; font-size:11px; letter-spacing:.17em; margin:14px auto 28px; }
    button { appearance:none; border:1px solid var(--amber); background:rgba(244,124,28,.07); color:var(--hot); padding:14px 29px; font:15px "Courier New",monospace; letter-spacing:.18em; cursor:pointer; box-shadow:inset 0 0 22px rgba(255,134,33,.1),0 0 18px rgba(255,134,33,.08); transition:.2s; animation:blink 1.35s step-end infinite; }
    button:hover,button:focus { background:var(--amber); color:#10100d; outline:none; }
    .instructions { margin-top:28px; display:flex; flex-wrap:wrap; justify-content:center; gap:8px 19px; color:#bc8250; font-size:11px; letter-spacing:.1em; }
    .instructions span:before { content:"// "; color:var(--amber); }
    @keyframes blink { 50%{opacity:.42} }
    #hud { position:fixed; inset:0; z-index:4; pointer-events:none; display:none; text-transform:uppercase; letter-spacing:.09em; font-size:12px; }
    #readout { position:absolute; left:23px; top:22px; padding-left:13px; border-left:2px solid var(--amber); line-height:1.75; text-shadow:0 0 8px rgba(255,155,56,.45); }
    #readout .muted { color:#aa6d3b; font-size:10px; }
    #location { position:absolute; right:23px; top:23px; color:#b27543; font-size:10px; text-align:right; line-height:1.65; }
    #crosshair { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:14px; height:14px; opacity:.9; }
    #crosshair:before,#crosshair:after { content:""; position:absolute; background:var(--hot); box-shadow:0 0 6px var(--amber); }
    #crosshair:before { width:14px; height:1px; left:0; top:6px; }
    #crosshair:after { height:14px; width:1px; top:0; left:6px; }
    #prompt { position:absolute; left:50%; top:calc(50% + 45px); transform:translateX(-50%); min-width:190px; text-align:center; padding:7px 10px; font-size:11px; border-top:1px solid rgba(255,155,56,.65); border-bottom:1px solid rgba(255,155,56,.4); background:rgba(4,5,6,.7); color:var(--hot); opacity:0; transition:opacity .15s; }
    #message { position:absolute; left:50%; bottom:8%; transform:translateX(-50%); color:var(--hot); background:rgba(5,6,7,.84); border:1px solid rgba(255,155,56,.54); padding:10px 16px; letter-spacing:.12em; font-size:12px; opacity:0; transition:opacity .25s; white-space:nowrap; }
    #fade { z-index:8; background:#000; opacity:0; pointer-events:none; transition:opacity 1.2s ease; color:#f1c38b; font-size:clamp(17px,3vw,27px); letter-spacing:.2em; text-shadow:0 0 14px #b15a1e; }
    #fade.active { opacity:1; }
    #fade span { opacity:0; transition:opacity .6s .9s; } #fade.active span{opacity:1}
    #vignette { position:fixed; inset:0; z-index:3; pointer-events:none; background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.12) 82%,rgba(0,0,0,.38) 100%); }
    @media(max-width:600px){ #readout{left:13px;top:13px;font-size:10px}#location{right:13px;top:13px;font-size:9px}.instructions{font-size:9px;gap:6px 10px} }
  </style>
</head>
<body>
  <section id="landing">
    <div class="landing-card">
      <div class="kicker">VANTAGE SYSTEMS // FREIGHTER REGISTRY 07</div>
      <h1>KESTREL-7</h1>
      <div class="sub">// LIGHT FREIGHTER // DEEP TRANSIT CONFIGURATION</div>
      <button id="board">CLICK TO BOARD</button>
      <div class="instructions"><span>WASD to Walk</span><span>Mouse to Look</span><span>E to Interact</span></div>
    </div>
  </section>
  <div id="hud">
    <div id="readout"><div>Energy: <b id="energy">100%</b></div><div class="muted">Objective: Explore ship cabins</div></div>
    <div id="location">KESTREL-7 / LVL 02<br><span id="sector">MIDSHIP CORRIDOR</span></div>
    <div id="crosshair"></div><div id="prompt"></div><div id="message"></div>
  </div>
  <div id="vignette"></div><div id="fade"><span>8 HOURS PASS...</span></div>

  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}</script>
  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const landing=document.querySelector('#landing'), board=document.querySelector('#board'), hud=document.querySelector('#hud');
    const energyEl=document.querySelector('#energy'), promptEl=document.querySelector('#prompt'), msgEl=document.querySelector('#message');
    const fade=document.querySelector('#fade'), sectorEl=document.querySelector('#sector');
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x05090c); scene.fog=new THREE.FogExp2(0x10191d,.018);
    const camera=new THREE.PerspectiveCamera(67,innerWidth/innerHeight,.1,180); camera.position.set(0,1.72,18);
    const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap; renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.55; document.body.appendChild(renderer.domElement);
    const controls=new PointerLockControls(camera,renderer.domElement);
    const clock=new THREE.Clock(), colliders=[], interactives=[], raycaster=new THREE.Raycaster(); raycaster.far=3.05;
    let playing=false, energy=100, current=null, sleepBusy=false;

    // Canvas textures keep the freighter self-contained: no image assets are loaded.
    function canvasTexture(draw,w=512,h=512){const c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');draw(x,w,h);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}
    const steelTex=canvasTexture((x,w,h)=>{x.fillStyle='#1b2225';x.fillRect(0,0,w,h);for(let i=0;i<13000;i++){const v=20+Math.random()*23;x.fillStyle=`rgba(${v},${v+5},${v+7},${Math.random()*.22})`;x.fillRect(Math.random()*w,Math.random()*h,1,1)}x.strokeStyle='rgba(0,0,0,.48)';x.lineWidth=3;for(let y=0;y<h;y+=64){x.beginPath();x.moveTo(0,y);x.lineTo(w,y);x.stroke()}x.strokeStyle='rgba(108,124,125,.14)';x.lineWidth=1;for(let i=0;i<19;i++){x.beginPath();x.moveTo(Math.random()*w,0);x.lineTo(Math.random()*w,h);x.stroke()}},512,512); steelTex.repeat.set(2,2);
    const floorTex=canvasTexture((x,w,h)=>{x.fillStyle='#11191c';x.fillRect(0,0,w,h);x.strokeStyle='#344044';x.lineWidth=3;for(let a=0;a<=w;a+=64){x.beginPath();x.moveTo(a,0);x.lineTo(a,h);x.stroke();x.beginPath();x.moveTo(0,a);x.lineTo(w,a);x.stroke()}x.fillStyle='rgba(242,113,26,.22)';for(let i=0;i<90;i++)x.fillRect(Math.random()*w,Math.random()*h,2,2)},512,512);floorTex.repeat.set(6,14);
    const hazardTex=canvasTexture((x,w,h)=>{x.fillStyle='#1d1810';x.fillRect(0,0,w,h);x.strokeStyle='#e58224';x.lineWidth=45;for(let i=-h;i<w+h;i+=110){x.beginPath();x.moveTo(i,0);x.lineTo(i-h,h);x.stroke()}},256,256);hazardTex.repeat.set(1,4);
    const starTex=canvasTexture((x,w,h)=>{x.fillStyle='#020309';x.fillRect(0,0,w,h);for(let i=0;i<900;i++){const a=Math.random()*Math.PI*2,r=Math.pow(Math.random(),.52)*w*.7,px=w/2+Math.cos(a)*r,py=h/2+Math.sin(a)*r;const s=Math.random()<.04?2:Math.random()*1.1;x.fillStyle=`rgba(${170+Math.random()*85},${180+Math.random()*70},255,${.35+Math.random()*.65})`;x.fillRect(px,py,s,s)}for(let i=0;i<7;i++){const g=x.createRadialGradient(Math.random()*w,Math.random()*h,0,Math.random()*w,Math.random()*h,120);g.addColorStop(0,'rgba(74,38,115,.14)');g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;x.fillRect(0,0,w,h)}},1024,1024);
    const mSteel=new THREE.MeshStandardMaterial({map:steelTex,color:0xaeb9bb,roughness:.72,metalness:.58});
    const mFloor=new THREE.MeshStandardMaterial({map:floorTex,roughness:.75,metalness:.55});
    const mDark=new THREE.MeshStandardMaterial({color:0x273337,roughness:.55,metalness:.76});
    const mHazard=new THREE.MeshStandardMaterial({map:hazardTex,roughness:.7,metalness:.35,emissive:0x3d1604,emissiveIntensity:.25});
    const mGlow=new THREE.MeshStandardMaterial({color:0xff6f1b,emissive:0xfa4e09,emissiveIntensity:2.1,roughness:.4});
    const mYellow=new THREE.MeshStandardMaterial({color:0xb67b24,roughness:.4,metalness:.7});
    const mBed=new THREE.MeshStandardMaterial({color:0x4a3f36,roughness:.95});
    const mStar=new THREE.MeshBasicMaterial({map:starTex,side:THREE.DoubleSide});
    function box(x,y,z,sx,sy,sz,mat=mSteel,solid=false){const q=new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),mat);q.position.set(x,y,z);q.castShadow=q.receiveShadow=true;scene.add(q);if(solid)colliders.push({x,z,hx:sx/2,hz:sz/2});return q;}
    function cylinder(x,y,z,r,h,mat=mDark,rot='z'){const q=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,16),mat);q.position.set(x,y,z);if(rot==='x')q.rotation.z=Math.PI/2; if(rot==='z')q.rotation.x=Math.PI/2;q.castShadow=q.receiveShadow=true;scene.add(q);return q;}
    function light(x,y,z,color=0xff6a18,intensity=1.4,dist=8){const l=new THREE.PointLight(color,intensity*2.1,dist,2);l.position.set(x,y,z);scene.add(l);return l;}
    function roomShell(name,z1,z2,x2=22){
      const zc=(z1+z2)/2, d=z2-z1;
      box(13,.02,zc,18,.14,d,mFloor); box(13,5.8,zc,18,.15,d,mSteel);
      box(x2,2.9,zc,.45,5.8,d,mSteel,true); box(13,2.9,z1,18,5.8,.45,mSteel,true); box(13,2.9,z2,18,5.8,.45,mSteel,true);
      // Shared bulkhead, split around a three-metre entry from the corridor.
      const doorZ=zc, seg=(d-3)/2; box(4,2.9,z1+seg/2,.45,5.8,seg,mSteel,true);box(4,2.9,z2-seg/2,.45,5.8,seg,mSteel,true);
      box(4.25,2.9,doorZ, .2,5.8,.13,mHazard); light(6,4.8,doorZ,0xff6615,1.4,6);
      const label=makeLabel(name); label.position.set(4.32,4.7,doorZ); label.rotation.y=Math.PI/2; scene.add(label);
    }
    function makeLabel(text){const c=document.createElement('canvas');c.width=512;c.height=80;const x=c.getContext('2d');x.fillStyle='rgba(7,9,10,.9)';x.fillRect(0,0,512,80);x.strokeStyle='#d36a24';x.strokeRect(2,2,508,76);x.fillStyle='#f29a45';x.font='24px monospace';x.fillText(text,25,49);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return new THREE.Mesh(new THREE.PlaneGeometry(2.7,.42),new THREE.MeshBasicMaterial({map:t,transparent:true,side:THREE.DoubleSide}));}
    function addInteractive(mesh,type,prompt){mesh.userData.interaction={type,prompt};interactives.push(mesh);return mesh;}

    // Main corridor
    box(0,.02,-12.5,8,.15,75,mFloor); box(0,5.8,-12.5,8,.15,75,mSteel); box(-4,2.9,-12.5,.42,5.8,75,mSteel,true);
    // right corridor walls only in unoccupied bands, leaving cabin entries.
    [[21,25],[4,8],[-10,-6],[-27,-23],[-50,-46]].forEach(([a,b])=>box(4,2.9,(a+b)/2,.42,5.8,Math.abs(a-b),mSteel,true));
    box(0,2.9,25,8,5.8,.42,mSteel,true);box(0,2.9,-50,8,5.8,.42,mSteel,true);
    for(let z=21;z>-50;z-=6){box(-3.55,3,z,.22,5.5,.42,mDark,true);box(3.55,3,z,.22,5.5,.42,mDark,true);box(-3.3,5.18,z,.3,.08,1.7,mGlow);box(3.3,5.18,z,.3,.08,1.7,mGlow);box(0,.14,z,6.7,.06,.17,mHazard);}
    for(let z=20;z>-49;z-=12){cylinder(-2.9,4.7,z,.16,5.8,mYellow,'z');cylinder(-2.55,4.5,z,.11,5.8,mYellow,'z');}
    for(let z=18;z>-48;z-=9)light(0,5.25,z,0xff6721,1.2,8);

    roomShell('WINDOW DECK',8,22); roomShell('GALLEY',-10,4); roomShell('CREW QUARTERS',-27,-13); roomShell('FLIGHT DECK',-47,-30,26);
    // Window deck: circular star portal in an industrial bulkhead.
    const portal=new THREE.Mesh(new THREE.CircleGeometry(3.3,48),mStar);portal.position.set(21.72,3.4,15);portal.rotation.y=-Math.PI/2;scene.add(portal);
    const ring=new THREE.Mesh(new THREE.TorusGeometry(3.55,.28,12,48),mDark);ring.position.set(21.62,3.4,15);ring.rotation.y=Math.PI/2;scene.add(ring);
    for(let a=0;a<8;a++){const p=new THREE.Mesh(new THREE.BoxGeometry(.38,.28,.65),mYellow);p.position.set(21.42,3.4+Math.sin(a*Math.PI/4)*3.58,15+Math.cos(a*Math.PI/4)*3.58);p.rotation.x=a*Math.PI/4;scene.add(p)}
    box(11.2,1.1,15,3.8,.38,1.4,mDark,true);box(11.2,1.5,15,3.3,.12,1.15,mBed);light(15,4.8,15,0xff8132,1.5,8);
    // Galley stove and suspended kitchen modules.
    box(12,.9,-3,3.6,1.35,1.65,mDark,true);const stove=addInteractive(box(12,1.61,-3,2.7,.16,1.3,new THREE.MeshStandardMaterial({color:0x242d2f,metalness:.9,roughness:.35})), 'cook','PRESS E TO COOK');
    for(let x=11;x<=13;x+=1){for(let z=-3.35;z<=-2.65;z+=.7){const burner=new THREE.Mesh(new THREE.TorusGeometry(.25,.04,8,18),mGlow);burner.position.set(x,1.72,z);burner.rotation.x=Math.PI/2;scene.add(burner)}}
    box(18,3.8,-3,1.7,2.4,5,mDark);box(17.1,4.8,-3,.06,.8,3,mGlow);light(10,4.8,-3,0xff5715,1.8,8);
    // Quarters bed and storage locker.
    box(13,.75,-20,5.5,1.05,2.8,mDark,true);const bed=addInteractive(box(13,1.35,-20,5.1,.22,2.45,mBed),'rest','PRESS E TO REST');
    box(10.9,1.62,-20,2.15,.25,2.3,new THREE.MeshStandardMaterial({color:0x80705d,roughness:1}));box(19,2.6,-20,2.4,5.1,3.1,mDark,true);box(17.74,3.7,-20,.05,.9,1.6,mGlow);light(10,4.8,-20,0xff7131,1.5,8);
    // Flight deck: a broad framed observation window and planet.
    box(25.75,5.15,-38.5,.42,1.25,16,mSteel,true);box(25.75,.55,-38.5,.42,1.1,16,mSteel,true);box(25.75,2.85,-46.3,.42,4.6,.6,mSteel,true);box(25.75,2.85,-30.7,.42,4.6,.6,mSteel,true);
    const planetGroup=new THREE.Group();scene.add(planetGroup);const planet=new THREE.Mesh(new THREE.SphereGeometry(12,48,32),new THREE.MeshStandardMaterial({color:0x54718a,roughness:.93,metalness:.08,emissive:0x102130,emissiveIntensity:.35}));planet.position.set(44,2.7,-38.5);planetGroup.add(planet);
    const cloudTex=canvasTexture((x,w,h)=>{x.clearRect(0,0,w,h);for(let i=0;i<100;i++){x.fillStyle=`rgba(170,205,220,${Math.random()*.21})`;x.beginPath();x.ellipse(Math.random()*w,Math.random()*h,20+Math.random()*110,4+Math.random()*25,Math.random()*2,0,7);x.fill()}},512,256);const clouds=new THREE.Mesh(new THREE.SphereGeometry(12.1,48,32),new THREE.MeshBasicMaterial({map:cloudTex,transparent:true,opacity:.55,blending:THREE.AdditiveBlending}));clouds.position.copy(planet.position);planetGroup.add(clouds);
    for(const x of [10,17]){box(x,.9,-38.5,2,1.25,2,mDark,true);box(x,1.65,-38.5,1.55,.2,1.5,mBed);box(x,2.55,-38.5,1.5,1.6,.18,mDark);box(x,2.58,-39.15,1.3,.08,.42,mGlow)}
    box(21,1.5,-38.5,3,1.5,7,mDark,true);box(20.6,2.25,-38.5,.2,.08,6.2,mGlow);light(21,4.5,-38.5,0xff7330,1.4,10);
    const ambient=new THREE.HemisphereLight(0x5a7480,0x15100d,1.05);scene.add(ambient);

    function blocked(pos){const r=.34;return colliders.some(c=>Math.abs(pos.x-c.x)<c.hx+r && Math.abs(pos.z-c.z)<c.hz+r);}
    function displayMessage(text,ms=1800){msgEl.textContent=text;msgEl.style.opacity=1;clearTimeout(displayMessage.timer);displayMessage.timer=setTimeout(()=>msgEl.style.opacity=0,ms)}
    function updateEnergy(v){energy=Math.max(0,Math.min(100,v));energyEl.textContent=Math.round(energy)+'%'}
    function doInteraction(){if(!current||sleepBusy)return;const {type}=current.userData.interaction;if(type==='cook'){updateEnergy(100);displayMessage('ENERGY RESTORED. GALLEY CYCLE COMPLETE.')}if(type==='rest'){sleepBusy=true;fade.classList.add('active');setTimeout(()=>{updateEnergy(100);fade.classList.remove('active');displayMessage('REST CYCLE COMPLETE. ENERGY RESTORED.');sleepBusy=false},3200)}}
    board.addEventListener('click',()=>controls.lock());
    controls.addEventListener('lock',()=>{playing=true;landing.style.display='none';hud.style.display='block';clock.start()});
    controls.addEventListener('unlock',()=>{if(playing&&!sleepBusy){landing.style.display='grid';hud.style.display='none'}});
    addEventListener('keydown',e=>{if(e.code==='KeyE')doInteraction()});
    addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
    const keys={};addEventListener('keydown',e=>keys[e.code]=true);addEventListener('keyup',e=>keys[e.code]=false);
    function sector(){const z=camera.position.z;if(z>7)return 'WINDOW DECK';if(z>-11)return 'GALLEY';if(z>-28)return 'CREW QUARTERS';if(z<-30)return 'FLIGHT DECK';return 'MIDSHIP CORRIDOR'}
    function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.05);if(controls.isLocked&&!sleepBusy){
      const before=camera.position.clone(), speed=(keys.ShiftLeft?6.2:3.1)*dt; if(keys.KeyW)controls.moveForward(speed);if(keys.KeyS)controls.moveForward(-speed);if(keys.KeyA)controls.moveRight(-speed);if(keys.KeyD)controls.moveRight(speed);
      if(blocked(camera.position)){camera.position.x=before.x;camera.position.z=before.z}camera.position.y=1.72;
      raycaster.setFromCamera(new THREE.Vector2(0,0),camera);const hit=raycaster.intersectObjects(interactives,false)[0];current=hit?.object||null;promptEl.textContent=current?current.userData.interaction.prompt:'';promptEl.style.opacity=current?1:0;
      updateEnergy(energy-dt*.012);sectorEl.textContent=sector();
    }
    portal.rotation.z+=dt*.025;planetGroup.rotation.y+=dt*.018;clouds.rotation.y+=dt*.032;
    renderer.render(scene,camera)}
    animate();
  </script>
</body>
</html>
