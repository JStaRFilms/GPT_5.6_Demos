  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,segments),material);m.name=name;m.position.set(x,y,z);if(axis==='x')m.rotation.z=Math.PI/2;if(axis==='z')m.rotation.x=Math.PI/2;m.castShadow=true;m.receiveShadow=true;scene.add(m);if(solid)colliders.push(new THREE.Box3().setFromObject(m));return m;

box('corridor floor',0,-.12,-10,6.4,.24,60,mat.floor,false); box('corridor ceiling',0,3.55,-10,6.4,.25,60,mat.dark,true);

const starGeo=new THREE.BufferGeometry(), starPos=[];
for(let i=0;i<900;i++){const r=35+Math.random()*45, a=Math.random()*Math.PI*2, b=Math.acos(2*Math.random()-1);starPos.push(-20+r*Math.cos(a)*Math.sin(b),1.7+r*Math.cos(b),-24+r*Math.sin(a)*Math.sin(b));}

for(const x of [-8.4,0,8.4])box('window strut',x,1.75,-53.85,.28,3.5,.28,mat.dark,true);

// Planet and exterior dust.
const planetTex=(()=>{const c=document.createElement('canvas');c.width=512;c.height=256;const x=c.getContext('2d');const g=x.createLinearGradient(0,0,0,256);g.addColorStop(0,'#6e4026');g.addColorStop(.48,'#b36b35');g.addColorStop(1,'#2a1715');x.fillStyle=g;x.fillRect(0,0,512,256);for(let i=0;i<95;i++){x.strokeStyle=`rgba(${120+Math.random()*90|0},${55+Math.random()*60|0},${25+Math.random()*35|0},.25)`;x.lineWidth=2+Math.random()*12;x.beginPath();const y=Math.random()*256;x.moveTo(0,y);for(let p=0;p<8;p++)x.lineTo(p*74,y+Math.sin(p*1.7+i)*10);x.stroke();}const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;t.wrapS=THREE.RepeatWrapping;return t;})();
const planet=new THREE.Mesh(new THREE.SphereGeometry(14,64,32),new THREE.MeshStandardMaterial({map:planetTex,roughness:1}));planet.position.set(3,-3,-79);scene.add(planet);animated.push({type:'rotate',obj:planet,speed:.018,axis:'y'});
const sun=new THREE.DirectionalLight(0xffc37b,3.1);sun.position.set(-18,10,-61);scene.add(sun);
const dustGeo=new THREE.BufferGeometry(),dustPos=[];for(let i=0;i<220;i++)dustPos.push((Math.random()-.5)*22,Math.random()*3.2,(Math.random()-.5)*58-11);dustGeo.setAttribute('position',new THREE.Float32BufferAttribute(dustPos,3));scene.add(new THREE.Points(dustGeo,new THREE.PointsMaterial({color:0xd3883d,size:.025,transparent:true,opacity:.5})));

// Gameplay.
const raycaster=new THREE.Raycaster();raycaster.far=3.2;
const clock=new THREE.Clock();const velocity=new THREE.Vector3();const direction=new THREE.Vector3();const playerRadius=.34;
function blocked(pos){
  const player=new THREE.Box3(new THREE.Vector3(pos.x-playerRadius,.12,pos.z-playerRadius),new THREE.Vector3(pos.x+playerRadius,1.78,pos.z+playerRadius));
  return colliders.some(c=>c.intersectsBox(player));
}
function movePlayer(dt){
  const damp=Math.exp(-10*dt);velocity.x*=damp;velocity.z*=damp;direction.set(Number(keys.KeyD)-Number(keys.KeyA),0,Number(keys.KeyW)-Number(keys.KeyS)).normalize();
  const speed=keys.ShiftLeft?4.5:3.25;if(direction.lengthSq()){velocity.x+=direction.x*speed*14*dt;velocity.z+=direction.z*speed*14*dt;}
  const old=camera.position.clone();controls.moveRight(velocity.x*dt);if(blocked(camera.position))camera.position.copy(old);
  const mid=camera.position.clone();controls.moveForward(velocity.z*dt);if(blocked(camera.position))camera.position.copy(mid);
  camera.position.y=1.65;
}
function updateInteraction(){
  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);const hits=raycaster.intersectObjects(interactives.map(i=>i.mesh),false);currentInteract=null;
  if(hits.length){currentInteract=interactives.find(i=>i.mesh===hits[0].object);promptEl.textContent=currentInteract.prompt;promptEl.classList.add('visible');}
  else promptEl.classList.remove('visible');
}
let msgTimer;function message(text,duration=2100){clearTimeout(msgTimer);messageEl.textContent=text;messageEl.classList.add('visible');msgTimer=setTimeout(()=>messageEl.classList.remove('visible'),duration);}
function interact(){if(!currentInteract||resting)return;if(currentInteract.action==='cook'){energy=100;message('ENERGY RESTORED.');}else if(currentInteract.action==='rest'){resting=true;fadeEl.classList.add('active');setTimeout(()=>{energy=100;},900);setTimeout(()=>{fadeEl.classList.remove('active');resting=false;message('REST CYCLE COMPLETE.');},3000);}}
function roomName(){const p=camera.position;let name='MAIN CORRIDOR';if(p.z<-40)name='COCKPIT';else if(p.x<-3.4&&p.z<-17)name='WINDOW DECK';else if(p.x>3.4&&p.z<-17)name='GALLEY';else if(p.x>3.4&&p.z>-9)name='CREW QUARTERS';else if(p.x<-3.4&&p.z>0)name='SERVICE NOOK';return name;}
let lastRoom='';function updateRoom(){const room=roomName();if(room!==lastRoom){lastRoom=room;roomEl.querySelector('strong').textContent=room;roomEl.style.opacity='1';setTimeout(()=>roomEl.style.opacity='.25',2300);}if(room==='COCKPIT'&&!reachedCockpit){reachedCockpit=true;objectiveEl.textContent='OBJECTIVE // FLIGHT DECK REACHED';message('KESTREL-7 NAVIGATION ONLINE.',3000);}}

function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.05);if(controls.isLocked&&!resting){movePlayer(dt);updateInteraction();updateRoom();energy=Math.max(0,energy-dt*.055);energyEl.textContent=`ENERGY: ${Math.ceil(energy)}%`;if(energy<20)energyEl.style.color='#ff5b35';}
  for(const a of animated)a.obj.rotation[a.axis]+=a.speed*dt*60;renderer.render(scene,camera);
}
animate();

document.querySelector('#board').addEventListener('click',()=>{started=true;controls.lock();});
pause.addEventListener('click',()=>controls.lock());
controls.addEventListener('lock',()=>{landing.style.display='none';pause.style.display='none';hud.style.display='block';});
controls.addEventListener('unlock',()=>{if(started&&!resting){pause.style.display='grid';hud.style.display='none';}});
addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyE'&&controls.isLocked)interact();});addEventListener('keyup',e=>keys[e.code]=false);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
