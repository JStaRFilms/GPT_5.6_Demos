<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whispering Pines — Forest Walk</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; overflow: hidden; background: #07110b; color: #eaf1df; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
  canvas { display: block; }
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
  #brand { position: absolute; top: 24px; left: 28px; letter-spacing: .2em; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #dfead8; text-shadow: 0 2px 12px #000; }
  #brand span { display: block; margin-top: 6px; letter-spacing: .09em; font-weight: 400; color: #afc3a6; font-size: 9px; }
  #fps { position: absolute; top: 24px; right: 28px; color: #e8f4e2; font-size: 11px; font-variant-numeric: tabular-nums; letter-spacing: .08em; text-shadow: 0 2px 12px #000; }
  #crosshair { position: absolute; left: 50%; top: 50%; width: 6px; height: 6px; border: 1px solid rgba(245,255,240,.55); border-radius: 50%; transform: translate(-50%,-50%); }
  #controls { position: absolute; left: 28px; bottom: 25px; display: flex; align-items: center; gap: 15px; pointer-events: auto; }
  button { border: 1px solid rgba(226,244,216,.32); background: rgba(10,23,13,.62); color: #eaf5e2; border-radius: 2px; padding: 10px 13px; cursor: pointer; font: 700 10px/1 Inter, sans-serif; letter-spacing: .11em; text-transform: uppercase; backdrop-filter: blur(8px); transition: .2s; }
  button:hover { background: rgba(74,112,59,.55); border-color: rgba(236,255,226,.7); }
  #hint { font-size: 10px; letter-spacing: .09em; color: rgba(225,239,216,.68); text-shadow: 0 2px 10px #000; }
  #start { position: fixed; z-index: 3; inset: 0; display: grid; place-items: center; background: radial-gradient(circle at 60% 30%, rgba(78,121,53,.12), transparent 37%), rgba(3,10,5,.28); cursor: pointer; }
  #start .card { text-align: center; padding: 30px; text-shadow: 0 3px 18px #000; }
  #start b { display:block; font-size: 26px; font-weight: 500; letter-spacing: .24em; text-transform: uppercase; }
  #start p { margin: 14px 0 0; font-size: 11px; letter-spacing: .13em; color: #d3dfce; text-transform: uppercase; }
  #start em { display:inline-block; margin-top: 26px; padding: 11px 16px; border: 1px solid rgba(235,255,225,.48); font-size: 10px; font-style: normal; letter-spacing: .14em; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="hud">
  <div id="brand">Whispering Pines<span>Procedural forest / field test</span></div>
  <div id="fps">-- FPS</div><div id="crosshair"></div>
  <div id="controls"><button id="performance">Performance Mode: Off</button><span id="hint">WASD TO WALK · MOUSE TO LOOK · SHIFT TO RUN</span></div>
</div>
<div id="start"><div class="card"><b>Enter the forest</b><p>Click to capture your cursor</p><em>Begin walk</em></div></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7d9980);
scene.fog = new THREE.FogExp2(0x839a84, 0.018);
const camera = new THREE.PerspectiveCamera(68, innerWidth / innerHeight, 0.1, 280);
camera.position.set(0, 2.25, 12);
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.6));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

// Deterministic terrain shared by the landscape, trees, grass, and player.
function terrain(x, z) { return Math.sin(x * .042) * 1.8 + Math.cos(z * .035) * 1.35 + Math.sin((x + z) * .025) * 1.2 + Math.sin(x * .11) * Math.cos(z * .09) * .34; }
function hash(n) { return (Math.sin(n * 999.91) * 43758.5453) % 1; }
function rand(n) { return hash(n) - Math.floor(hash(n)); }

const hemi = new THREE.HemisphereLight(0xc7ddc5, 0x1e3220, 1.45); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffedbd, 2.8); sun.position.set(-55, 68, -38); sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024); sun.shadow.camera.left = -55; sun.shadow.camera.right = 55; sun.shadow.camera.top = 55; sun.shadow.camera.bottom = -55; sun.shadow.bias = -0.0006; scene.add(sun);

// Vertex-displaced, vertex-colored terrain avoids texture downloads and remains one inexpensive draw call.
const groundGeo = new THREE.PlaneGeometry(300, 300, 120, 120); groundGeo.rotateX(-Math.PI / 2);
const pos = groundGeo.attributes.position, cols = [];
for (let i = 0; i < pos.count; i++) { const x = pos.getX(i), z = pos.getZ(i), y = terrain(x,z); pos.setY(i,y); const wet = Math.max(0, Math.min(1, (y + 2) / 6)); cols.push(.055 + wet*.055, .14 + wet*.17, .06 + wet*.07); }
groundGeo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3)); groundGeo.computeVertexNormals();
const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ vertexColors:true, roughness:1, metalness:0 })); ground.receiveShadow = true; scene.add(ground);

// Canvas-built foliage texture: one asset serves every grass blade while keeping alpha cutout crisp.
const grassCanvas = document.createElement('canvas'); grassCanvas.width = grassCanvas.height = 64;
const gc = grassCanvas.getContext('2d'); const gr = gc.createLinearGradient(0,64,0,0); gr.addColorStop(0,'#203d1d'); gr.addColorStop(.55,'#4d7b31'); gr.addColorStop(1,'#a2bd5e'); gc.fillStyle=gr; gc.beginPath(); gc.moveTo(28,64); gc.quadraticCurveTo(31,29,35,1); gc.quadraticCurveTo(34,41,39,64); gc.closePath(); gc.fill();
const grassTex = new THREE.CanvasTexture(grassCanvas); grassTex.colorSpace = THREE.SRGBColorSpace;
const grassMat = new THREE.MeshStandardMaterial({ map:grassTex, transparent:true, alphaTest:.38, side:THREE.DoubleSide, roughness:1, depthWrite:false, color:0x94b96b });
const bladeGeo = new THREE.PlaneGeometry(.18, 1.45); bladeGeo.translate(0,.72,0);
const MAX_GRASS = 62000; const grass = new THREE.InstancedMesh(bladeGeo, grassMat, MAX_GRASS); grass.frustumCulled = false; grass.castShadow = false; grass.receiveShadow = true; scene.add(grass);
const gm = new THREE.Object3D();
for (let i=0; i<MAX_GRASS; i++) { const a=rand(i*2.1)*Math.PI*2, r=Math.sqrt(rand(i*5.7))*128; const x=Math.cos(a)*r, z=Math.sin(a)*r; gm.position.set(x,terrain(x,z)-.04,z); gm.rotation.y=rand(i*9.1)*Math.PI; const s=.42+rand(i*4.3)*.9; gm.scale.set(s, .5+rand(i*3.2), s); gm.updateMatrix(); grass.setMatrixAt(i,gm.matrix); }
grass.instanceMatrix.needsUpdate=true;

// A 250-tree forest. Each layer is an InstancedMesh: few draw calls, varied transformations.
const TREE_COUNT=260, treeData=[]; const trunkGeo=new THREE.CylinderGeometry(.23,.42,1,8,6); trunkGeo.translate(0,.5,0);
const trunkMat=new THREE.MeshStandardMaterial({color:0x5a412b, roughness:1, flatShading:true});
const trunks=new THREE.InstancedMesh(trunkGeo,trunkMat,TREE_COUNT); trunks.castShadow=true; trunks.receiveShadow=true; scene.add(trunks);
const crownGeo=new THREE.IcosahedronGeometry(1,2); const crownMats=[0x234725,0x315c2b,0x1b3820].map(c=>new THREE.MeshStandardMaterial({color:c,roughness:.9,flatShading:true}));
const crowns=crownMats.map(mat=>{const m=new THREE.InstancedMesh(crownGeo,mat,TREE_COUNT);m.castShadow=true;m.receiveShadow=true;scene.add(m);return m;});
for(let i=0;i<TREE_COUNT;i++) { let x,z,ok=false; for(let tries=0;tries<20&&!ok;tries++){const a=rand(i*7.17+tries)*Math.PI*2,r=14+rand(i*13.3+tries)*110;x=Math.cos(a)*r;z=Math.sin(a)*r;ok=Math.hypot(x,z)>17;} const y=terrain(x,z), h=5+rand(i*5.1)*7, s=.82+rand(i*3.8)*.65; treeData.push({x,z,y,h,s}); gm.position.set(x,y,z);gm.rotation.set(0,rand(i*8)*6.28,0);gm.scale.set(s,h,s);gm.updateMatrix();trunks.setMatrixAt(i,gm.matrix); for(let j=0;j<3;j++){gm.position.set(x+(rand(i*17+j)-.5)*1.45*s,y+h*(.68+j*.13),z+(rand(i*31+j)-.5)*1.45*s); gm.rotation.set(rand(i*15+j)*.22,rand(i*21+j)*6.28,rand(i*25+j)*.2);const cs=s*(1.55-j*.16);gm.scale.set(cs,cs*(.9+rand(i*43+j)*.3),cs);gm.updateMatrix();crowns[j].setMatrixAt(i,gm.matrix);} }
trunks.instanceMatrix.needsUpdate=true; crowns.forEach(c=>c.instanceMatrix.needsUpdate=true);

// Low mist sheets use a fragment shader so the fog visibly pools and drifts independent of scene FogExp2.
const mistUniforms={time:{value:0}, opacity:{value:.52}};
const mistMat=new THREE.ShaderMaterial({uniforms:mistUniforms,transparent:true,depthWrite:false,blending:THREE.NormalBlending,side:THREE.DoubleSide,vertexShader:`varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`uniform float time,opacity;varying vec2 vUv;float n(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(n(i),n(i+vec2(1,0)),f.x),mix(n(i+vec2(0,1)),n(i+vec2(1,1)),f.x),f.y);}void main(){vec2 uv=vUv;float a=noise(uv*7.+vec2(time*.011,time*.006))*.65+noise(uv*17.-time*.018)*.35;float edge=smoothstep(0.,.19,uv.x)*smoothstep(0.,.19,1.-uv.x)*smoothstep(0.,.14,uv.y)*smoothstep(0.,.14,1.-uv.y);gl_FragColor=vec4(.79,.87,.79,a*edge*opacity);}`});
for(let i=0;i<12;i++){const size=28+rand(i)*19, fogPlane=new THREE.Mesh(new THREE.PlaneGeometry(size,size*.42,1,1),mistMat); const x=(rand(i*3)-.5)*115,z=(rand(i*7)-.5)*115;fogPlane.position.set(x,terrain(x,z)+.55+rand(i)*.65,z);fogPlane.rotation.x=-Math.PI/2;fogPlane.rotation.z=rand(i*11)*Math.PI;scene.add(fogPlane);}

// Soft translucent shafts are a cheap god-ray illusion; they remain hidden in dense fog at distance.
const rayMat=new THREE.MeshBasicMaterial({color:0xffeab1,transparent:true,opacity:.055,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
for(let i=0;i<7;i++){const shaft=new THREE.Mesh(new THREE.CylinderGeometry(.35,4.5,27,10,1,true),rayMat);shaft.position.set(-20+i*8,15,-22+i*3);shaft.rotation.z=.55;scene.add(shaft);}

let yaw=0,pitch=-.05,locked=false,perf=false; const keys={};
const start=document.querySelector('#start'); start.addEventListener('click',()=>renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===renderer.domElement; start.classList.toggle('hidden',locked);});
document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*.0023;pitch=Math.max(-1.35,Math.min(1.35,pitch-e.movementY*.0023));});
addEventListener('keydown',e=>keys[e.code]=true);addEventListener('keyup',e=>keys[e.code]=false);
const performanceButton=document.querySelector('#performance'); performanceButton.onclick=()=>{perf=!perf; grass.count=perf?14000:MAX_GRASS; scene.fog.density=perf?.010:.018; mistUniforms.opacity.value=perf?.22:.52;renderer.setPixelRatio(Math.min(devicePixelRatio,perf?1:1.6));performanceButton.textContent=`Performance Mode: ${perf?'On':'Off'}`;};
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

let last=performance.now(),frames=0,fpsClock=last; const fpsEl=document.querySelector('#fps');
function animate(now){requestAnimationFrame(animate);const dt=Math.min(.05,(now-last)/1000);last=now; if(locked){const speed=(keys.ShiftLeft||keys.ShiftRight?10:5.2)*dt;let f=(keys.KeyW?1:0)-(keys.KeyS?1:0),s=(keys.KeyD?1:0)-(keys.KeyA?1:0);if(f||s){const l=Math.hypot(f,s);f/=l;s/=l;const sy=Math.sin(yaw),cy=Math.cos(yaw);camera.position.x+=(-sy*f+cy*s)*speed;camera.position.z+=(-cy*f-sy*s)*speed;camera.position.y=THREE.MathUtils.lerp(camera.position.y,terrain(camera.position.x,camera.position.z)+2.05,.1);}camera.rotation.set(pitch,yaw,0,'YXZ');} mistUniforms.time.value=now*.001;frames++;if(now-fpsClock>500){fpsEl.textContent=`${Math.round(frames*1000/(now-fpsClock))} FPS`;frames=0;fpsClock=now;}renderer.render(scene,camera);}
animate(performance.now());
</script>
</body>
</html>
