<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meadowmon — A Pocket-Sized Adventure</title>
  <style>
    :root { --ink:#29332d; --cream:#fff5d6; --sage:#91b779; --mint:#c6dca1; --peach:#e8a87c; }
    * { box-sizing:border-box; }
    html,body { min-height:100%; margin:0; }
    body {
      display:grid; place-items:center; padding:20px;
      color:var(--ink); background:#8daf78;
      background-image:linear-gradient(45deg,#86a970 25%,transparent 25%),linear-gradient(-45deg,#86a970 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#86a970 75%),linear-gradient(-45deg,transparent 75%,#86a970 75%);
      background-size:32px 32px; background-position:0 0,0 16px,16px -16px,-16px 0;
      font-family:"Courier New",monospace;
    }
    .shell { width:min(94vw,760px); text-align:center; }
    h1 { margin:0 0 8px; color:#fff5d6; font-size:clamp(22px,5vw,38px); letter-spacing:3px; text-shadow:3px 3px 0 #405a43; }
    .tag { margin:0 0 12px; color:#263a2d; font-weight:bold; }
    .frame { position:relative; padding:14px; border:5px solid #29332d; border-radius:18px; background:#e9b985; box-shadow:0 8px 0 #526f55,0 13px 24px #273b2c66; }
    canvas { display:block; width:100%; aspect-ratio:10/9; image-rendering:pixelated; image-rendering:crisp-edges; background:#fff5d6; border:4px solid #fff9e9; outline:4px solid #29332d; }
    .help { margin:14px 0 8px; padding:8px; color:#203528; background:#fff5d6dd; border:2px solid #29332d; font-size:13px; font-weight:bold; }
    .controls { display:none; grid-template-columns:repeat(5,1fr); gap:8px; margin-top:10px; user-select:none; }
    button { min-height:48px; border:3px solid #29332d; border-radius:7px; background:#fff5d6; color:#29332d; font:bold 18px monospace; box-shadow:0 4px 0 #526f55; touch-action:manipulation; cursor:pointer; }
    button:active { transform:translateY(3px); box-shadow:0 1px 0 #526f55; }
    @media (pointer:coarse),(max-width:700px) { .controls{display:grid}.help{font-size:11px} body{padding:10px} }
    @media (prefers-reduced-motion:reduce) { *{scroll-behavior:auto!important} }
  </style>
</head>
<body>
  <main class="shell">
    <h1>MEADOWMON</h1>
    <p class="tag">A pocket-sized wild adventure</p>
    <section class="frame" aria-label="Meadowmon game">
      <canvas id="game" width="320" height="288" tabindex="0" aria-label="Retro monster exploration and battle game"></canvas>
    </section>
    <p class="help">MOVE: ARROWS / WASD &nbsp; • &nbsp; SELECT: Z / ENTER &nbsp; • &nbsp; BACK: X / ESC</p>
    <div class="controls" aria-label="Touch controls">
      <button data-key="ArrowLeft" aria-label="Move left">◀</button>
      <button data-key="ArrowUp" aria-label="Move up">▲</button>
      <button data-key="ArrowDown" aria-label="Move down">▼</button>
      <button data-key="ArrowRight" aria-label="Move right">▶</button>
      <button data-key="z" aria-label="Select">A</button>
    </div>
  </main>
<script>
(() => {
  'use strict';
  const canvas = document.querySelector('#game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W=320,H=288,T=16;
  const C={ink:'#29332d',cream:'#fff5d6',paper:'#fffbed',grass:'#a8c98a',grass2:'#83ad72',dark:'#567557',path:'#e7c58d',path2:'#cca96f',water:'#8bc8c4',blue:'#5d9fa5',roof:'#d77c68',roof2:'#ad5d59',wood:'#c98c67',white:'#fffdf1',red:'#c95757',gold:'#e7ad55'};

  class Sound {
    constructor(){ this.ac=null; this.on=true; }
    init(){ if(!this.ac) this.ac=new (window.AudioContext||window.webkitAudioContext)(); if(this.ac.state==='suspended') this.ac.resume(); }
    tone(freq=440,d=.08,type='square',vol=.045,slide=0,delay=0){
      if(!this.on)return; this.init(); const t=this.ac.currentTime+delay,o=this.ac.createOscillator(),g=this.ac.createGain();
      o.type=type;o.frequency.setValueAtTime(freq,t); if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(35,freq+slide),t+d);
      g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g).connect(this.ac.destination);o.start(t);o.stop(t+d);
    }
    blip(){this.tone(620,.045,'square',.03,100)}
    bump(){this.tone(110,.06,'square',.035,-35)}
    hit(){this.tone(150,.14,'sawtooth',.06,-90);this.tone(90,.1,'square',.04,30,.03)}
    heal(){[440,554,659].forEach((n,i)=>this.tone(n,.14,'square',.035,80,i*.08))}
    cry(base=190){[0,80,-30].forEach((s,i)=>this.tone(base+s,.13,'sawtooth',.035,-40,i*.09))}
    encounter(){[220,330,440,660].forEach((n,i)=>this.tone(n,.09,'square',.045,100,i*.07))}
  }
  const sfx=new Sound();

  // 0 meadow, 1 path, 2 trees, 3 water, 4 house, 5 door, 6 tall grass, 7 flowers
  const map=[
    '22222222222222222222','20000000666660000002','20007000666660007002','20000000666660000002','20000000011000000002','20004444011000444402','20004444011000444402','11114511111111451111','20000100011000010002','20000100011066610002','20000100011066610002','20000111111166610002','20000000011066610002','20077700011000077702','20000000011111000002','20000333000003330002','20000333007003330002','22222222222222222222'
  ].map(r=>r.split('').map(Number));

  const game={state:'title',time:0,flash:0,shake:0,transition:0,message:'',msgUntil:0,houseLock:false};
  const keys=new Set();
  const player={tx:10,ty:14,x:160,y:224,fromX:160,fromY:224,toX:160,toY:224,moving:false,moveT:0,dir:'up',step:0};
  const hero={name:'MOSSBIT',level:8,maxHp:34,hp:34,showHp:34};
  let enemy=null, menuIndex=0, moveIndex=0, battleMode='menu', turnTimer=0, battleText='', pendingAction=null;
  const monsters=[
    {name:'EMBEROO',level:6,maxHp:25,base:25,colors:['#29332d','#d36f55','#f0b05d','#fff5d6'],sprite:['....111.....','...11111....','..1122211...','.112222211..','.122020221..','.122222221..','..1222221...','...13331....','..1133311...','.11.333.11..','....3.3.....','...33.33....']},
    {name:'BUBBLO',level:5,maxHp:28,base:28,colors:['#29332d','#68a8ad','#a9d6c8','#fff5d6'],sprite:['....111.....','..1122211...','.122222221..','12220202221.','12222222221.','12223332221.','.122333221..','..1233321...','...13331....','..11.3.11...','....3.3.....','...33.33....']},
    {name:'PECKLE',level:7,maxHp:23,base:23,colors:['#29332d','#d9a65b','#f4d88a','#fff5d6'],sprite:['.....11.....','....1221....','...122221...','..12202221..','.1222202221.','.1222222221.','..12333321..','...133331...','....1331....','...11..11...','..11....11..','............']}
  ];
  const heroSprite={colors:['#29332d','#5f8e5f','#a8c98a','#fff5d6'],sprite:['....1111....','...122221...','..12222221..','.1222020221.','.1222222221.','122233332221','122333333221','.1233333321.','..13333331..','...133331...','..11.33.11..','.11..33..11.']};

  const blocked=(x,y)=>y<0||x<0||y>=map.length||x>=map[0].length||[2,3,4].includes(map[y][x]);
  function startMove(dx,dy,dir){
    if(game.state!=='world'||player.moving)return; player.dir=dir; const nx=player.tx+dx,ny=player.ty+dy;
    if(blocked(nx,ny)){sfx.bump();return}
    player.fromX=player.x;player.fromY=player.y;player.toX=nx*T;player.toY=ny*T;player.tx=nx;player.ty=ny;player.moveT=0;player.moving=true;player.step^=1;
  }
  function finishStep(){
    const tile=map[player.ty][player.tx];
    if(tile===5&&!game.houseLock){ game.houseLock=true; showMessage('A warm light restores MOSSBIT!',1800); hero.hp=hero.maxHp; sfx.heal(); setTimeout(()=>{player.ty=8;player.y=player.toY=player.fromY=8*T;},500); }
    else if(tile!==5) game.houseLock=false;
    if(tile===6&&Math.random()<.15) beginEncounter();
  }
  function showMessage(text,d=1200){game.message=text;game.msgUntil=performance.now()+d}
  function beginEncounter(){ game.state='transition';game.transition=0;sfx.encounter(); }
  function startBattle(){
    const base=monsters[(Math.random()*monsters.length)|0]; enemy={...base,hp:base.maxHp,showHp:base.maxHp}; game.state='battle';battleMode='intro';battleText=`Wild ${enemy.name} appeared!`;turnTimer=1100;menuIndex=0;sfx.cry(170+enemy.level*10);
  }
  function leaveBattle(text='Got away safely!'){battleText=text;battleMode='leaving';turnTimer=800}

  function input(k){
    sfx.init();
    if(game.state==='title'){game.state='world';sfx.blip();return}
    if(game.state==='world'){
      if(k==='arrowup'||k==='w')startMove(0,-1,'up'); if(k==='arrowdown'||k==='s')startMove(0,1,'down');
      if(k==='arrowleft'||k==='a')startMove(-1,0,'left'); if(k==='arrowright'||k==='d')startMove(1,0,'right'); return;
    }
    if(game.state!=='battle'||!['menu','moves'].includes(battleMode))return;
    if(battleMode==='menu'){
      const old=menuIndex;
      if(k==='arrowleft'||k==='a')menuIndex=menuIndex%2?menuIndex-1:menuIndex;
      if(k==='arrowright'||k==='d')menuIndex=menuIndex%2===0?menuIndex+1:menuIndex;
      if(k==='arrowup'||k==='w')menuIndex=Math.max(0,menuIndex-2); if(k==='arrowdown'||k==='s')menuIndex=Math.min(3,menuIndex+2);
      if(menuIndex!==old)sfx.blip();
      if(k==='z'||k==='enter'||k===' '){sfx.blip();chooseMenu(menuIndex)}
    } else {
      const old=moveIndex;
      if(k==='arrowup'||k==='w')moveIndex=Math.max(0,moveIndex-1);if(k==='arrowdown'||k==='s')moveIndex=Math.min(3,moveIndex+1);
      if(moveIndex!==old)sfx.blip();
      if(k==='x'||k==='escape'){battleMode='menu';sfx.blip()}
      if(k==='z'||k==='enter'||k===' '){sfx.blip();playerAttack(moveIndex)}
    }
  }
  function chooseMenu(i){
    if(i===0){battleMode='moves';moveIndex=0;return}
    if(i===1){ if(hero.hp===hero.maxHp){battleText='The berry would have no effect.';battleMode='pause';turnTimer=850;pendingAction='menu'} else {hero.hp=Math.min(hero.maxHp,hero.hp+14);battleText='You used a DEW BERRY!';battleMode='pause';turnTimer=950;pendingAction='enemy';sfx.heal()} }
    if(i===2){battleText='MOSSBIT is already doing its best!';battleMode='pause';turnTimer=900;pendingAction='menu'}
    if(i===3){ if(Math.random()<.8)leaveBattle();else{battleText="Couldn't escape!";battleMode='pause';turnTimer=850;pendingAction='enemy'} }
  }
  const moves=[['VINE TAP',7,96],['SPORE PUFF',9,86],['HEAD BONK',6,100],['GROWL',4,100]];
  function playerAttack(i){
    const [name,power,accuracy]=moves[i]; battleMode='pause';
    if(Math.random()*100>accuracy){battleText=`MOSSBIT used ${name}... but missed!`;turnTimer=900;pendingAction='enemy';return}
    const dmg=Math.max(2,power+((Math.random()*5)|0)-2);enemy.hp=Math.max(0,enemy.hp-dmg);battleText=`MOSSBIT used ${name}!`;game.shake=10;sfx.hit();turnTimer=950;pendingAction=enemy.hp<=0?'win':'enemy';
  }
  function enemyAttack(){
    const dmg=Math.max(2,4+enemy.level+((Math.random()*5)|0)-2);hero.hp=Math.max(0,hero.hp-dmg);battleText=`${enemy.name} used WILD BOP!`;game.shake=10;sfx.hit();battleMode='pause';turnTimer=1000;pendingAction=hero.hp<=0?'lose':'menu';
  }

  function update(dt){
    game.time+=dt;game.flash=Math.max(0,game.flash-dt);game.shake=Math.max(0,game.shake-dt*.03);
    hero.showHp+=(hero.hp-hero.showHp)*Math.min(1,dt*.008);if(enemy)enemy.showHp+=(enemy.hp-enemy.showHp)*Math.min(1,dt*.008);
    if(game.state==='world'){
      if(player.moving){player.moveT+=dt;const p=Math.min(1,player.moveT/115),e=1-Math.pow(1-p,2);player.x=player.fromX+(player.toX-player.fromX)*e;player.y=player.fromY+(player.toY-player.fromY)*e;if(p>=1){player.x=player.toX;player.y=player.toY;player.moving=false;finishStep()}}
      else { if(keys.has('arrowup')||keys.has('w'))startMove(0,-1,'up');else if(keys.has('arrowdown')||keys.has('s'))startMove(0,1,'down');else if(keys.has('arrowleft')||keys.has('a'))startMove(-1,0,'left');else if(keys.has('arrowright')||keys.has('d'))startMove(1,0,'right'); }
    }
    if(game.state==='transition'){game.transition+=dt;if(game.transition>850)startBattle()}
    if(game.state==='battle'&&!['menu','moves'].includes(battleMode)){
      turnTimer-=dt;if(turnTimer<=0){
        if(battleMode==='intro'){battleMode='menu';battleText='What will MOSSBIT do?'}
        else if(battleMode==='leaving'){game.state='world';battleMode='menu'}
        else if(battleMode==='pause'){
          const action=pendingAction;pendingAction=null;
          if(action==='enemy')enemyAttack();
          else if(action==='win'){battleText=`Wild ${enemy.name} fainted!`;battleMode='leaving';turnTimer=1100;sfx.heal()}
          else if(action==='lose'){hero.hp=hero.maxHp;battleText='MOSSBIT fainted... Homeward!';battleMode='leaving';turnTimer=1400;player.tx=10;player.ty=14;player.x=player.toX=160;player.y=player.toY=224}
          else {battleMode='menu';battleText='What will MOSSBIT do?'}
        }
      }
    }
  }

  function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0)}
  function text(t,x,y,size=8,align='left',color=C.ink){ctx.fillStyle=color;ctx.font=`bold ${size}px monospace`;ctx.textAlign=align;ctx.textBaseline='top';ctx.fillText(t,x,y)}
  function box(x,y,w,h,fill=C.paper){rect(x,y,w,h,C.ink);rect(x+3,y+3,w-6,h-6,C.white);rect(x+5,y+5,w-10,h-10,C.ink);rect(x+7,y+7,w-14,h-14,fill)}
  function tile(n,x,y){
    if(n===0||n===6||n===7){rect(x,y,T,T,C.grass);rect(x+(x+y)%7,y+3,2,2,C.grass2)}
    if(n===1||n===5){rect(x,y,T,T,C.path);rect(x+2,y+4,3,2,C.path2);rect(x+11,y+11,2,2,C.path2)}
    if(n===2){rect(x,y,T,T,C.dark);rect(x+2,y+1,12,11,C.grass2);rect(x+5,y,6,5,C.grass);rect(x+7,y+11,3,5,'#6f5b42')}
    if(n===3){rect(x,y,T,T,C.water);rect(x+(game.time/180|0)%8,y+5,7,2,C.white);rect(x+8-(game.time/220|0)%7,y+12,6,2,C.blue)}
    if(n===4){rect(x,y,T,T,C.wood);rect(x,y,16,5,C.roof);rect(x+2,y+5,12,2,C.roof2);rect(x+5,y+9,6,7,'#8c604d')}
    if(n===5){rect(x,y,T,T,C.path);rect(x+4,y,8,12,'#775143');rect(x+10,y+6,2,2,C.gold)}
    if(n===6){rect(x+1,y+4,3,12,C.dark);rect(x+6,y+1,3,15,C.grass2);rect(x+11,y+5,3,11,C.dark)}
    if(n===7){rect(x+4,y+5,3,3,'#f4d98a');rect(x+9,y+9,3,3,'#fff4bd');rect(x+6,y+8,1,5,C.dark)}
  }
  function drawPlayer(){
    const x=player.x,y=player.y+(player.moving&&player.moveT%110<55?-1:0);rect(x+5,y+2,6,4,'#5b493c');rect(x+4,y+5,8,5,C.cream);rect(x+3,y+9,10,5,C.roof);rect(x+5,y+14,3,2,C.ink);rect(x+9,y+14,3,2,C.ink);
    if(player.dir==='left')rect(x+4,y+7,2,2,C.ink);else if(player.dir==='right')rect(x+10,y+7,2,2,C.ink);else if(player.dir==='down'){rect(x+6,y+7,2,2,C.ink);rect(x+10,y+7,2,2,C.ink)}
  }
  function drawWorld(){
    for(let y=0;y<18;y++)for(let x=0;x<20;x++)tile(map[y][x],x*T,y*T);
    drawPlayer();
    box(6,6,93,25,C.cream);text('SUNMEADOW',14,12,10);text('GRASSLAND',14,23,6,C.dark);
    if(performance.now()<game.msgUntil){box(18,222,284,58);text(game.message,30,241,9)}
  }
  function pixelSprite(data,x,y,scale=4,flip=false){
    const rows=data.sprite,cols=data.colors;for(let yy=0;yy<rows.length;yy++)for(let xx=0;xx<rows[yy].length;xx++){const v=+rows[yy][xx];if(v){const dx=flip?rows[yy].length-1-xx:xx;rect(x+dx*scale,y+yy*scale,scale,scale,cols[v-1])}}
  }
  function hpPanel(x,y,w,name,level,hp,max,display){
    box(x,y,w,48);text(name,x+10,y+9,9);text(`Lv${level}`,x+w-10,y+10,7,'right');text('HP',x+12,y+27,6);
    rect(x+30,y+27,w-42,7,C.ink);const ratio=Math.max(0,display/max);rect(x+32,y+29,(w-46)*ratio,3,ratio>.5?'#64a85b':ratio>.2?'#d5a849':C.red);
    if(x>100)text(`${Math.ceil(hp)} / ${max}`,x+w-11,y+37,6,'right');
  }
  function drawBattle(){
    rect(0,0,W,H,C.cream);for(let y=0;y<190;y+=8){ctx.globalAlpha=.16;rect(0,y,W,4,C.grass2)}ctx.globalAlpha=1;
    // ground shadows
    ctx.fillStyle='#8caf7766';ctx.beginPath();ctx.ellipse(242,93,48,12,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(80,178,54,13,0,0,Math.PI*2);ctx.fill();
    if(enemy)pixelSprite(enemy,215+(game.shake?Math.sin(game.time*.07)*game.shake:0),47,4,true);
    pixelSprite(heroSprite,34,126,5,false);
    if(enemy)hpPanel(13,18,151,enemy.name,enemy.level,enemy.hp,enemy.maxHp,enemy.showHp);
    hpPanel(155,130,155,hero.name,hero.level,hero.hp,hero.maxHp,hero.showHp);
    box(4,202,312,82);
    if(battleMode==='menu'){
      text(battleText,15,214,8); const labels=['FIGHT','BAG','PKMN','RUN'];
      labels.forEach((l,i)=>{const x=170+(i%2)*68,y=216+((i/2)|0)*25;text((menuIndex===i?'> ':'  ')+l,x,y,9)});
    } else if(battleMode==='moves'){
      const labels=moves.map(m=>m[0]);labels.forEach((l,i)=>text((moveIndex===i?'> ':'  ')+l,18,211+i*16,8));text(`POWER ${moves[moveIndex][1]}`,204,218,7);text(`ACC.  ${moves[moveIndex][2]}`,204,235,7);text('X: BACK',204,258,6);
    } else text(battleText,17,226,9);
  }
  function drawTitle(){
    rect(0,0,W,H,C.cream);for(let y=0;y<H;y+=16)for(let x=(y/16%2)*16;x<W;x+=32)rect(x,y,16,16,'#e8dcae');
    ctx.save();ctx.translate(160,100);ctx.scale(1.5,1.5);pixelSprite(heroSprite,-24,-24,4);ctx.restore();
    text('MEADOWMON',160,35,25,'center',C.ink);text('WILD DAYS',160,64,11,'center',C.roof2);box(48,194,224,48,C.cream);text('PRESS Z / ENTER',160,211,11,'center');text('Explore • Battle • Be kind',160,257,8,'center',C.dark);
  }
  function drawTransition(){
    drawWorld();const p=Math.min(1,game.transition/850);const band=16;for(let y=0;y<H;y+=band){const fromLeft=(y/band)%2===0;const ww=W*Math.min(1,p*1.6);rect(fromLeft?0:W-ww,y,ww,band,p>.65?C.ink:C.white)}
  }
  function render(){ctx.save();if(game.state==='title')drawTitle();else if(game.state==='world')drawWorld();else if(game.state==='transition')drawTransition();else drawBattle();ctx.restore()}

  let last=performance.now();function loop(now){const dt=Math.min(40,now-last);last=now;update(dt);render();requestAnimationFrame(loop)}
  addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['arrowup','arrowdown','arrowleft','arrowright',' ','z','x','w','a','s','d','enter','escape'].includes(k))e.preventDefault();if(!e.repeat)input(k);keys.add(k)});
  addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
  document.querySelectorAll('[data-key]').forEach(b=>{const k=b.dataset.key.toLowerCase();b.addEventListener('pointerdown',e=>{e.preventDefault();keys.add(k);input(k)});b.addEventListener('pointerup',()=>keys.delete(k));b.addEventListener('pointercancel',()=>keys.delete(k))});
  canvas.addEventListener('pointerdown',()=>{canvas.focus();input('z')});
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
